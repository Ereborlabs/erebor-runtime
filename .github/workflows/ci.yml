name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libglib2.0-dev libostree-dev

      - name: Verify Rust workspace
        run: bash .github/scripts/verify-rust-ci.sh
