syntax = "proto3";

package erebor.runtime.ipc.v1;

message Envelope {
  uint32 protocol_version = 1;
  uint64 message_id = 2;
  uint64 correlation_id = 3;
  string message_kind = 4;
  bytes payload = 5;
  repeated Header headers = 6;
}

message Header {
  string key = 1;
  string value = 2;
}

message GuardHello {
  uint32 protocol_version = 1;
  string session_id = 2;
  string actor_id = 3;
  int64 guard_pid = 4;
  string runner_kind = 5;
  string platform = 6;
  repeated string capabilities = 7;
}

message GuardHelloAck {
  uint32 protocol_version = 1;
  string broker_id = 2;
  bool accepted = 3;
  string reason = 4;
}

message InterceptionRequest {
  uint64 request_id = 1;
  string actor_id = 2;
  InterceptionSource source = 3;
  int64 pid = 4;
  int64 ppid = 5;
  string executable = 6;
  repeated string argv = 7;
  string cwd = 8;
  repeated EnvVar selected_env = 9;
  RequestedEndpoint requested_endpoint = 10;
  string matched_handler_id = 11;
  string timestamp = 12;
  InterceptionOperation operation = 13;
  ProcessExecOperation process_exec = 14;
  FileOperation file = 15;
  SocketOperation socket = 16;
}

message InterceptionDecision {
  uint64 request_id = 1;
  DecisionKind decision = 2;
  string rule_id = 3;
  string reason = 4;
  uint32 timeout_ms = 5;
  AllowDecision allow = 6;
  DenyDecision deny = 7;
  MediateDecision mediate = 8;
}

message GuardEvent {
  uint64 request_id = 1;
  string message = 2;
  string timestamp = 3;
}

message GuardGoodbye {
  int64 guard_pid = 1;
  int32 exit_code = 2;
  string reason = 3;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message RequestedEndpoint {
  string scheme = 1;
  string host = 2;
  uint32 port = 3;
  string path = 4;
}

message ProcessExecOperation {
  string executable = 1;
  repeated string argv = 2;
  RequestedEndpoint requested_endpoint = 3;
  string matched_handler_id = 4;
}

message FileOperation {
  FileOperationKind kind = 1;
  string path = 2;
}

message SocketOperation {
  SocketOperationKind kind = 1;
  string scheme = 2;
  string host = 3;
  uint32 port = 4;
  string path = 5;
}

message AllowDecision {
  string exec_target = 1;
}

message DenyDecision {
  int32 exit_code = 1;
}

message MediateDecision {
  string kind = 1;
  string replacement_surface = 2;
  string endpoint = 3;
  string lease_id = 4;
  string print_line = 5;
  bool keepalive = 6;
}

enum InterceptionSource {
  INTERCEPTION_SOURCE_UNSPECIFIED = 0;
  INTERCEPTION_SOURCE_PTRACE = 1;
  INTERCEPTION_SOURCE_SHIM = 2;
  INTERCEPTION_SOURCE_FUTURE_ENDPOINT = 3;
}

enum InterceptionOperation {
  INTERCEPTION_OPERATION_UNSPECIFIED = 0;
  INTERCEPTION_OPERATION_PROCESS_EXEC = 1;
  INTERCEPTION_OPERATION_FILE_OPEN = 2;
  INTERCEPTION_OPERATION_FILE_READ = 3;
  INTERCEPTION_OPERATION_FILE_MUTATION = 4;
  INTERCEPTION_OPERATION_SOCKET_CONNECT = 5;
}

enum FileOperationKind {
  FILE_OPERATION_KIND_UNSPECIFIED = 0;
  FILE_OPERATION_KIND_OPEN = 1;
  FILE_OPERATION_KIND_READ = 2;
  FILE_OPERATION_KIND_MUTATION = 3;
}

enum SocketOperationKind {
  SOCKET_OPERATION_KIND_UNSPECIFIED = 0;
  SOCKET_OPERATION_KIND_CONNECT = 1;
}

enum DecisionKind {
  DECISION_KIND_UNSPECIFIED = 0;
  DECISION_KIND_ALLOW = 1;
  DECISION_KIND_DENY = 2;
  DECISION_KIND_REQUIRE_APPROVAL = 3;
  DECISION_KIND_MEDIATE = 4;
}
