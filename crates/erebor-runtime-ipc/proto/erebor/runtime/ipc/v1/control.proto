syntax = "proto3";

package erebor.runtime.ipc.v1;

message Envelope {
  uint32 protocol_version = 1;
  uint64 message_id = 2;
  uint64 correlation_id = 3;
  string message_kind = 4;
  bytes payload = 5;
  repeated Header headers = 6;
}

message Header {
  string key = 1;
  string value = 2;
}

message GuardHello {
  uint32 protocol_version = 1;
  string session_id = 2;
  string actor_id = 3;
  int64 guard_pid = 4;
  string runner_kind = 5;
  string platform = 6;
  repeated string capabilities = 7;
}

message GuardHelloAck {
  uint32 protocol_version = 1;
  string broker_id = 2;
  bool accepted = 3;
  string reason = 4;
}

message InterceptionRequest {
  uint64 request_id = 1;
  string actor_id = 2;
  InterceptionSource source = 3;
  int64 pid = 4;
  int64 ppid = 5;
  string executable = 6;
  repeated string argv = 7;
  string cwd = 8;
  repeated EnvVar selected_env = 9;
  RequestedEndpoint requested_endpoint = 10;
  string matched_handler_id = 11;
  string timestamp = 12;
  InterceptionOperation operation = 13;
  ProcessExecOperation process_exec = 14;
  FileOperation file = 15;
  SocketOperation socket = 16;
}

message InterceptionDecision {
  uint64 request_id = 1;
  DecisionKind decision = 2;
  string rule_id = 3;
  string reason = 4;
  uint32 timeout_ms = 5;
  AllowDecision allow = 6;
  DenyDecision deny = 7;
  MediateDecision mediate = 8;
}

// Lifecycle events are emitted by the Linux process guard over the same
// authenticated connection that carries physical-effect interception requests.
// They carry observed process facts only; agent-specific recognition and policy
// remain in the session broker's registered lifecycle handlers.
message GuardLifecycleEvent {
  uint64 request_id = 1;
  GuardLifecycleEventKind event = 2;
  int64 pid = 3;
  repeated string exec_history = 4;
  int64 parent_pid = 5;
  int64 child_pid = 6;
  bool exited_successfully = 7;
}

message GuardLifecycleReply {
  uint64 request_id = 1;
  GuardLifecycleReplyKind decision = 2;
  string reason = 3;
}

message GuardEvent {
  uint64 request_id = 1;
  string message = 2;
  string timestamp = 3;
}

message GuardGoodbye {
  int64 guard_pid = 1;
  int32 exit_code = 2;
  string reason = 3;
}

// HookHello is the only hook-supplied identity message. The broker obtains
// HookPeerEvidence independently from the Unix connection and process view;
// it never trusts peer identity fields supplied in native hook JSON.
message HookHello {
  uint32 protocol_version = 1;
  string ticket_id = 2;
}

message HookHelloAck {
  uint32 protocol_version = 1;
  bool accepted = 2;
  string reason = 3;
}

message HookPeerEvidence {
  string ticket_id = 1;
  int64 observed_pid = 2;
  uint64 process_start_time_ticks = 3;
  string executable = 4;
  repeated string argv = 5;
  uint64 cgroup_inode = 6;
  uint64 mount_namespace_inode = 7;
  PipeIdentity stdin = 8;
  PipeIdentity stdout = 9;
  uint64 pidfd_identity = 10;
  repeated string exec_chain = 11;
  uint32 observed_uid = 12;
  uint32 observed_gid = 13;
}

message PipeIdentity {
  uint64 device = 1;
  uint64 inode = 2;
}

message HookEvent {
  HookEventKind event = 1;
  string schema_sha256 = 2;
  bytes native_event_json = 3;
}

message HookResult {
  HookEventKind event = 1;
  bool accepted = 2;
  bytes result_json = 3;
}

message HookRejection {
  HookRejectionCode code = 1;
  string reason = 2;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message RequestedEndpoint {
  string scheme = 1;
  string host = 2;
  uint32 port = 3;
  string path = 4;
}

message ProcessExecOperation {
  string executable = 1;
  repeated string argv = 2;
  RequestedEndpoint requested_endpoint = 3;
  string matched_handler_id = 4;
}

message FileOperation {
  FileOperationKind kind = 1;
  string path = 2;
  FileIdentity resolved_identity = 3;
}

message FileIdentity {
  uint64 device = 1;
  uint64 inode = 2;
}

message SocketOperation {
  SocketOperationKind kind = 1;
  string scheme = 2;
  string host = 3;
  uint32 port = 4;
  string path = 5;
}

message AllowDecision {
  string exec_target = 1;
}

message DenyDecision {
  int32 exit_code = 1;
}

message MediateDecision {
  string kind = 1;
  string replacement_surface = 2;
  string endpoint = 3;
  string lease_id = 4;
  string print_line = 5;
  bool keepalive = 6;
}

enum InterceptionSource {
  INTERCEPTION_SOURCE_UNSPECIFIED = 0;
  INTERCEPTION_SOURCE_PTRACE = 1;
  INTERCEPTION_SOURCE_SHIM = 2;
  INTERCEPTION_SOURCE_FUTURE_ENDPOINT = 3;
}

enum InterceptionOperation {
  INTERCEPTION_OPERATION_UNSPECIFIED = 0;
  INTERCEPTION_OPERATION_PROCESS_EXEC = 1;
  INTERCEPTION_OPERATION_FILE_OPEN = 2;
  INTERCEPTION_OPERATION_FILE_READ = 3;
  INTERCEPTION_OPERATION_FILE_MUTATION = 4;
  INTERCEPTION_OPERATION_SOCKET_CONNECT = 5;
}

enum GuardLifecycleEventKind {
  GUARD_LIFECYCLE_EVENT_KIND_UNSPECIFIED = 0;
  GUARD_LIFECYCLE_EVENT_KIND_EXEC = 1;
  GUARD_LIFECYCLE_EVENT_KIND_FORK = 2;
  GUARD_LIFECYCLE_EVENT_KIND_EXIT = 3;
}

enum GuardLifecycleReplyKind {
  GUARD_LIFECYCLE_REPLY_KIND_UNSPECIFIED = 0;
  GUARD_LIFECYCLE_REPLY_KIND_IGNORE = 1;
  GUARD_LIFECYCLE_REPLY_KIND_HOLD = 2;
  GUARD_LIFECYCLE_REPLY_KIND_ALLOW = 3;
  GUARD_LIFECYCLE_REPLY_KIND_DENY = 4;
  GUARD_LIFECYCLE_REPLY_KIND_RELEASE = 5;
}

enum FileOperationKind {
  FILE_OPERATION_KIND_UNSPECIFIED = 0;
  FILE_OPERATION_KIND_OPEN = 1;
  FILE_OPERATION_KIND_READ = 2;
  FILE_OPERATION_KIND_MUTATION = 3;
}

enum SocketOperationKind {
  SOCKET_OPERATION_KIND_UNSPECIFIED = 0;
  SOCKET_OPERATION_KIND_CONNECT = 1;
}

enum DecisionKind {
  DECISION_KIND_UNSPECIFIED = 0;
  DECISION_KIND_ALLOW = 1;
  DECISION_KIND_DENY = 2;
  DECISION_KIND_REQUIRE_APPROVAL = 3;
  DECISION_KIND_MEDIATE = 4;
}

enum HookEventKind {
  HOOK_EVENT_KIND_UNSPECIFIED = 0;
  HOOK_EVENT_KIND_SESSION_START = 1;
  HOOK_EVENT_KIND_USER_PROMPT_SUBMIT = 2;
  HOOK_EVENT_KIND_PRE_TOOL_USE = 3;
  HOOK_EVENT_KIND_PERMISSION_REQUEST = 4;
  HOOK_EVENT_KIND_POST_TOOL_USE = 5;
  HOOK_EVENT_KIND_SUBAGENT_START = 6;
  HOOK_EVENT_KIND_SUBAGENT_STOP = 7;
  HOOK_EVENT_KIND_STOP = 8;
}

enum HookRejectionCode {
  HOOK_REJECTION_CODE_UNSPECIFIED = 0;
  HOOK_REJECTION_CODE_UNSUPPORTED_VERSION = 1;
  HOOK_REJECTION_CODE_UNAUTHENTICATED_PEER = 2;
  HOOK_REJECTION_CODE_TICKET_NOT_FOUND = 3;
  HOOK_REJECTION_CODE_TICKET_MISMATCH = 4;
  HOOK_REJECTION_CODE_TICKET_REPLAYED = 5;
  HOOK_REJECTION_CODE_EVENT_TOO_LARGE = 6;
  HOOK_REJECTION_CODE_INVALID_SCHEMA = 7;
  HOOK_REJECTION_CODE_BROKER_UNAVAILABLE = 8;
}
