syntax = "proto3";

package erebor.runtime.ipc.v1;

message Envelope {
  uint32 protocol_version = 1;
  uint64 message_id = 2;
  uint64 correlation_id = 3;
  string session_id = 4;
  string message_kind = 5;
  bytes payload = 6;
  repeated Header headers = 7;
}

message Header {
  string key = 1;
  string value = 2;
}

message GuardHello {
  uint32 protocol_version = 1;
  string session_id = 2;
  string actor_id = 3;
  int64 guard_pid = 4;
  string runner_kind = 5;
  string platform = 6;
  repeated string capabilities = 7;
}

message GuardHelloAck {
  uint32 protocol_version = 1;
  string broker_id = 2;
  bool accepted = 3;
  string reason = 4;
}

message InterceptionRequest {
  uint64 request_id = 1;
  string session_id = 2;
  string actor_id = 3;
  InterceptionSource source = 4;
  int64 pid = 5;
  int64 ppid = 6;
  string executable = 7;
  repeated string argv = 8;
  string cwd = 9;
  repeated EnvVar selected_env = 10;
  RequestedEndpoint requested_endpoint = 11;
  string matched_handler_id = 12;
  string timestamp = 13;
}

message InterceptionDecision {
  uint64 request_id = 1;
  DecisionKind decision = 2;
  string rule_id = 3;
  string reason = 4;
  uint32 timeout_ms = 5;
  AllowDecision allow = 6;
  DenyDecision deny = 7;
  MediateDecision mediate = 8;
}

message GuardEvent {
  uint64 request_id = 1;
  string session_id = 2;
  string message = 3;
  string timestamp = 4;
}

message GuardGoodbye {
  string session_id = 1;
  int64 guard_pid = 2;
  int32 exit_code = 3;
  string reason = 4;
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message RequestedEndpoint {
  string scheme = 1;
  string host = 2;
  uint32 port = 3;
  string path = 4;
}

message AllowDecision {
  string exec_target = 1;
}

message DenyDecision {
  int32 exit_code = 1;
}

message MediateDecision {
  string kind = 1;
  string replacement_surface = 2;
  string endpoint = 3;
  string lease_id = 4;
  string print_line = 5;
  bool keepalive = 6;
}

enum InterceptionSource {
  INTERCEPTION_SOURCE_UNSPECIFIED = 0;
  INTERCEPTION_SOURCE_PTRACE = 1;
  INTERCEPTION_SOURCE_SHIM = 2;
  INTERCEPTION_SOURCE_FUTURE_ENDPOINT = 3;
}

enum DecisionKind {
  DECISION_KIND_UNSPECIFIED = 0;
  DECISION_KIND_ALLOW = 1;
  DECISION_KIND_DENY = 2;
  DECISION_KIND_REQUIRE_APPROVAL = 3;
  DECISION_KIND_MEDIATE = 4;
}
