syntax = "proto3";

package erebor.runtime.ipc.v1;

message DaemonHello {
  uint32 protocol_version = 1;
  string client_name = 2;
  repeated string capabilities = 3;
}

message DaemonHelloAck {
  uint32 protocol_version = 1;
  string daemon_version = 2;
  repeated string capabilities = 3;
}

message DaemonStatusRequest {}

message DaemonStatusResponse {
  int64 daemon_pid = 1;
  uint64 configuration_generation = 2;
  string service_state = 3;
}

message DaemonLogsRequest {
  uint64 after_sequence = 1;
  uint32 maximum_records = 2;
}

message DaemonLogRecord {
  uint64 sequence = 1;
  string timestamp = 2;
  string level = 3;
  string message = 4;
}

message DaemonLogsEnd {
  uint64 last_sequence = 1;
}

message DaemonReloadRequest {}

message DaemonStopRequest {}

// Enrolls a vendor/user-provided Codex executable against one root-curated
// release. The daemon resolves source_path through its UID-dropped descriptor
// broker; it never searches PATH or downloads a binary.
message AgentInstallRequest {
  string package_reference = 1;
  string source_path = 2;
}

message AgentInstallResponse {
  string package_digest = 1;
  string installation_digest = 2;
  repeated string aliases = 3;
}

// Creates a Codex session from a daemon-owned local alias. The request names
// no executable or argv: the daemon resolves the certified entrypoint after it
// re-verifies the enrolled artifact.
message CodexRunRequest {
  string alias = 1;
  string workspace = 2;
  string policy_set_reference = 3;
  string daemon_failure_mode = 4;
  uint64 requested_loss_grace_seconds = 5;
  bool tty = 6;
  bool detached = 7;
}

message SessionCreateRequest {
  string runner_id = 1;
  repeated string command = 2;
  string workspace = 3;
  string policy_set_digest = 4;
  string package_digest = 5;
  string installation_digest = 6;
  string adapter_digest = 7;
  string daemon_failure_mode = 8;
  uint64 requested_loss_grace_seconds = 9;
  repeated SessionEnvironmentEntry environment = 10;
  repeated string secret_references = 11;
  string container_image_digest = 12;
  bool tty = 13;
  bool detached = 14;
}

message SessionEnvironmentEntry {
  string key = 1;
  string value = 2;
}

message SessionCreateResponse {
  string session_id = 1;
  string state = 2;
  uint64 generation = 3;
  uint64 retry_guarantee_expires_unix_ms = 4;
}

message SessionStartRequest {
  string session_id = 1;
}

message SessionStopRequest {
  string session_id = 1;
  uint64 grace_period_seconds = 2;
}

message SessionKillRequest {
  string session_id = 1;
  string signal = 2;
}

message SessionInspectRequest {
  string session_id = 1;
}

message SessionListRequest {}

message SessionRecord {
  string session_id = 1;
  string state = 2;
  uint64 generation = 3;
  uint32 owner_uid = 4;
  string runner_id = 5;
  string runner_recovery = 6;
  string failure = 7;
  uint64 retry_guarantee_expires_unix_ms = 8;
  bool retention_hold = 9;
}

message SessionListResponse {
  repeated SessionRecord sessions = 1;
}

message SessionWaitRequest {
  string session_id = 1;
  uint64 after_generation = 2;
}

message SessionRemoveRequest {
  string session_id = 1;
  bool force = 2;
}

message SessionLogsRequest {
  string session_id = 1;
  string stream = 2;
  uint64 after_sequence = 3;
  uint32 maximum_records = 4;
}

message SessionLogChunk {
  string session_id = 1;
  string stream = 2;
  uint64 sequence = 3;
  uint64 timestamp_unix_ms = 4;
  bytes data = 5;
  bool durable = 6;
}

message SessionLogsEnd {
  string session_id = 1;
  string stream = 2;
  uint64 durable_cursor = 3;
  bool truncated_before_cursor = 4;
}

message SessionEventsRequest {
  string session_id = 1;
  uint64 after_sequence = 2;
  uint32 maximum_records = 3;
}

message SessionEventRecord {
  string session_id = 1;
  uint64 sequence = 2;
  uint64 timestamp_unix_ms = 3;
  string event_kind = 4;
  bytes payload = 5;
  bool durable = 6;
}

message SessionEventsEnd {
  string session_id = 1;
  uint64 durable_cursor = 2;
  bool truncated_before_cursor = 3;
}

// The daemon-owned evidence stream is distinct from lifecycle events. The
// client only presents these durable records; it never opens a legacy
// workspace registry or reconstructs evidence locally.
message SessionEvidenceRequest {
  string session_id = 1;
  uint64 after_sequence = 2;
  uint32 maximum_records = 3;
}

message SessionEvidenceRecord {
  string session_id = 1;
  uint64 sequence = 2;
  uint64 timestamp_unix_ms = 3;
  string source = 4;
  bytes payload = 5;
  bool durable = 6;
}

message SessionEvidenceEnd {
  string session_id = 1;
  uint64 durable_cursor = 2;
  bool truncated_before_cursor = 3;
}

message SessionAttachRequest {
  string session_id = 1;
  uint64 after_output_sequence = 2;
  bool request_input_lease = 3;
  string client_instance_id = 4;
}

message SessionAttachResponse {
  string session_id = 1;
  bool read_only = 2;
  string input_lease_id = 3;
  uint64 input_lease_expires_unix_ms = 4;
}

message SessionInputLeaseRenewRequest {
  string session_id = 1;
  string input_lease_id = 2;
  string client_instance_id = 3;
}

message SessionInputLeaseReleaseRequest {
  string session_id = 1;
  string input_lease_id = 2;
  string client_instance_id = 3;
}

message SessionInputLeaseResponse {
  string session_id = 1;
  string input_lease_id = 2;
  uint64 expires_unix_ms = 3;
  bool released = 4;
}

// Interactive input is deliberately separate from the lease mutation RPCs.
// It is bound to the current lease and is never replayed through idempotency.
message SessionInputRequest {
  string session_id = 1;
  string input_lease_id = 2;
  string client_instance_id = 3;
  bytes data = 4;
}

message SessionInputResponse {
  string session_id = 1;
  uint32 accepted_bytes = 2;
}

message SessionPruneRequest {
  uint64 terminal_before_unix_ms = 1;
  uint32 maximum_sessions = 2;
}

message SessionPruneResponse {
  uint32 pruned_sessions = 1;
  repeated string retained_session_ids = 2;
}

message SessionAliasSetRequest {
  string alias = 1;
  string session_id = 2;
}

message SessionAliasRemoveRequest {
  string alias = 1;
}

message SessionAliasListRequest {}

message SessionAliasRecord {
  string alias = 1;
  string session_id = 2;
}

message SessionAliasListResponse {
  repeated SessionAliasRecord aliases = 1;
}

message AdminSessionListRequest {
  uint32 target_uid = 1;
  bool all_users = 2;
}

message AdminSessionInspectRequest {
  uint32 target_uid = 1;
  string session_id = 2;
}

message AdminSessionStopRequest {
  uint32 target_uid = 1;
  string session_id = 2;
  uint64 grace_period_seconds = 3;
}

message AdminSessionKillRequest {
  uint32 target_uid = 1;
  string session_id = 2;
  string signal = 3;
}

message AdminSessionSetRetentionHoldRequest {
  uint32 target_uid = 1;
  string session_id = 2;
  bool retention_hold = 3;
}

message DaemonCommandResult {
  string message = 1;
}

message DaemonError {
  uint32 status_code = 1;
  string message = 2;
}

message ApprovalListRequest {}

message ApprovalInspectRequest {
  string approval_id = 1;
  uint32 owner_uid = 2;
}

message ApprovalApproveRequest {
  string approval_id = 1;
  uint32 owner_uid = 2;
}

message ApprovalDenyRequest {
  string approval_id = 1;
  string reason = 2;
  uint32 owner_uid = 3;
}

message ApprovalRecord {
  string approval_id = 1;
  string state = 2;
  uint32 owner_uid = 3;
  string session_id = 4;
  uint64 session_generation = 5;
  string effect_digest = 6;
  string process_identity = 7;
  string policy_set_digest = 8;
  string policy_rule_id = 9;
  uint64 expires_at_unix_ms = 10;
}

message ApprovalListResponse {
  repeated ApprovalRecord approvals = 1;
}

message PolicyTestRequest {
  bytes policy_json = 1;
  bytes event_json = 2;
}

message PolicyTestResponse {
  bytes decision_json = 1;
}

message PolicyPackageApplyRequest {
  string path = 1;
}

message PolicyPackageRecord {
  string digest = 1;
  string name = 2;
}

message PolicyPackageListRequest {}

message PolicyPackageListResponse {
  repeated PolicyPackageRecord packages = 1;
}

message PolicyPackageInspectRequest {
  string digest = 1;
}

message PolicyPackageVerifyRequest {
  string digest = 1;
}

message PolicySetCreateRequest {
  string root_minimum_digest = 1;
  repeated string package_minimum_digests = 2;
  string local_override_digest = 3;
}

message PolicySetAliasSetRequest {
  string alias = 1;
  string policy_set_digest = 2;
}

message PolicySetAliasRecord {
  string alias = 1;
  string policy_set_digest = 2;
}

message PolicySetRecord {
  string digest = 1;
}

message PolicySetListRequest {}

message PolicySetListResponse {
  repeated PolicySetRecord policy_sets = 1;
}

message PolicySetInspectRequest {
  string digest = 1;
}

message PolicySetVerifyRequest {
  string digest = 1;
}

message RunnerListRequest {}

message RunnerInspectRequest {
  string runner_id = 1;
}

message RunnerCapabilityRecord {
  bytes document_json = 1;
  bool available = 2;
  string unavailable_reason = 3;
}

message RunnerListResponse {
  repeated RunnerCapabilityRecord runners = 1;
}
